name = "rakuda-solution-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://solution.rakuda-ai.com"

# Set ANTHROPIC_API_KEY via `wrangler secret put ANTHROPIC_API_KEY`
# Set RESEND_API_KEY via `wrangler secret put RESEND_API_KEY`

[[d1_databases]]
binding = "DB"
database_name = "rakuda-solution"
database_id = ""
